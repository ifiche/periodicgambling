    .desktop-nav .nav-item {
      flex-direction: row;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 40px;
      background: transparent;
      border: none;
      color: #7c93bb;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
    }
    .desktop-nav .nav-item i { font-size: 16px; margin: 0; }
    .desktop-nav .nav-item.active { background: #1e8aff; color: white; }
    .desktop-nav .nav-item:hover:not(.active) { background: #1a2332; color: #c6d9ff; }

    /* Bottom Navigation (Mobile/Android) - hidden on desktop */

      background: rgba(15, 20, 31, 0.96);
      backdrop-filter: blur(12px);
      border-top: 0.5px solid #27324a;
      padding: 6px 16px 12px;
      justify-content: space-around;
      align-items: center;
      position: sticky;
      bottom: 0;
      width: 100%;
      z-index: 100;
    }
    .bottom-nav .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: transparent;
      border: none;
      color: #7c93bb;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 30px;

    ["WCQ", "Colombia", "Chile", "Colombia WIN", 77, "Barranquilla heat", 1.75, 3.40, 4.50, false, 0.82, 2.0, 0.7],
    ["WCQ", "Faroe Islands", "Moldova", "Draw", 63, "Minnows clash", 2.80, 2.80, 2.70, false, 0.66, 1.0, 0.9],
    ["WCQ", "Israel", "Bulgaria", "Israel WIN", 72, "Home advantage", 2.10, 3.20, 3.40, false, 0.76, 1.6, 1.0],
    ["WCQ", "Kazakhstan", "Malta U19 W", "Kazakhstan WIN", 82, "Senior vs U19", 1.20, 5.50, 10.00, true, 0.93, 2.8, 0.3],
    ["WCQ", "Latvia", "Wales", "Wales WIN", 78, "Wales quality", 3.50, 3.20, 2.05, false, 0.84, 1.5, 1.2],
    ["AFC Champions", "Bangkok United", "Gamba Osaka", "Gamba WIN", 69, "J-League edge", 2.80, 3.30, 2.35, false, 0.73, 1.5, 1.2],
    ["Championship", "Luton Town", "Northampton", "Luton WIN", 78, "Kenilworth Road", 1.60, 3.70, 5.50, true, 0.87, 2.1, 0.6],
    ["League Two", "AFC Wimbledon", "Stockport County", "Stockport WIN", 73, "Promotion push", 2.60, 3.20, 2.60, false, 0.77, 1.5, 1.1],
    ["Saudi Pro", "Al-Nassr", "Al-Ittifaq", "Al-Nassr WIN", 80, "Ronaldo factor", 1.50, 4.20, 5.50, true, 0.88, 2.3, 0.6],
    ["K-League", "Ulsan HD", "FC Seoul", "Ulsan WIN", 75, "Champions", 1.85, 3.40, 3.80, false, 0.80, 1.8, 0.9],
    ["Indian Super", "Kerala Blasters", "Northeast Utd", "Kerala WIN", 74, "Kochi crowd", 1.85, 3.40, 3.90, false, 0.79, 1.8, 0.9],
    ["Australia NPL", "Canberra Croatia", "White Eagles", "Croatia WIN", 73, "Derby edge", 1.80, 3.60, 3.80, false, 0.78, 1.8, 0.9],
    ["Australia NPL", "Cooma Tigers", "Canberra Juventus", "Tigers WIN", 71, "Home form", 2.00, 3.40, 3.30, false, 0.75, 1.7, 0.9],
    ["Bosnian Premier", "Zrinjski Mostar", "Radnik Bijeljina", "Zrinjski WIN", 77, "Title holders", 1.45, 3.80, 7.00, true, 0.86, 2.2, 0.5],
    ["Bulgarian 1st", "Arda Kardzhali", "Ludogorets", "Ludogorets WIN", 83, "Champions class", 4.00, 3.50, 1.80, true, 0.91, 2.4, 0.6],
    ["Armenian Premier", "Andranik", "Urartu Yerevan", "Urartu WIN", 80, "Title contenders", 4.50, 3.60, 1.70, true, 0.88, 2.0, 0.7],
    ["Spain U19", "Barcelona U19", "Gimnastic Manresa", "Barca WIN", 90, "La Masia", 1.10, 7.00, 15.00, true, 0.98, 3.5, 0.2],
    ["Serbia U19", "Crvena Zvezda U19", "Mladost Lucani", "Zvezda WIN", 84, "Academy", 1.25, 5.00, 8.50, true, 0.92, 2.8, 0.4]
  ];

  const factorial = (n) => n <= 1 ? 1 : n * factorial(n-1);
  const poissonProb = (lambda, k) => Math.exp(-lambda) * Math.pow(lambda, k) / factorial(k);

  const generateCorrectScores = (homeStrength, awayStrength) => {
    const homeLambda = homeStrength * 1.15;
    const awayLambda = awayStrength * 0.85;
    const scores = [];
    for (let h = 0; h <= 4; h++) {
      for (let a = 0; a <= 4; a++) {
        const prob = poissonProb(homeLambda, h) * poissonProb(awayLambda, a) * 100;
        if (prob > 0.5) scores.push({ home: h, away: a, prob: Math.round(prob * 10) / 10 });
      }
    }
    return scores.sort((a,b) => b.prob - a.prob).slice(0, 4);
  };

  const generateBTTS = (hs, aw) => Math.min(82, Math.max(32, Math.round((hs * 0.45 + aw * 0.35) * 100)));
  const generateOver25 = (hs, aw) => Math.min(88, Math.max(28, Math.round((hs * 0.55 + aw * 0.45) * 100)));

  const matches = matchData.map(m => {
    const homeStr = m[11] || 1.6;
    const awayStr = m[12] || 0.8;
    const correctScores = generateCorrectScores(homeStr, awayStr);
    return {
      league: m[0], home: m[1], away: m[2], pred: m[3], conf: m[4], tip: m[5],
      odds: { home: m[6], draw: m[7], away: m[8] }, banker: m[9], value: m[10] || 0.75,
      correctScores, bttsProb: generateBTTS(homeStr, awayStr), over25Prob: generateOver25(homeStr, awayStr)
    };
  });

  // State management
  let state = { view: 'grouped', league: 'all', csLeague: 'all', page: 'predictions', sort: 'default' };
  const listeners = [];
  const setState = (key, val) => { state[key] = val; listeners.forEach(fn => fn(state)); };
  const subscribe = (fn) => { listeners.push(fn); fn(state); };

  const getLeagues = () => {
    const groups = {};
    matches.forEach(m => { groups[m.league] = groups[m.league] || []; groups[m.league].push(m); });
    return Object.keys(groups).sort().map(name => ({ name, matches: groups[name] }));
  };
  const getBankers = () => matches.filter(m => m.banker);
  const getFiltered = (league) => league === 'all' ? matches : matches.filter(m => m.league === league);
  const getSorted = (arr, sort) => {
    if (sort === 'confidence') return [...arr].sort((a,b) => b.conf - a.conf);
    if (sort === 'value') return [...arr].sort((a,b) => b.value - a.value);
    return arr;
  };

  const getMatchOdds = (m) => {
    if (m.pred.includes('Draw')) return m.odds.draw;
    if (m.pred.includes('AWAY')) return m.odds.away;
    return m.odds.home;
  };

  // Comprehensive Multibets - 6 different accumulators with 6hr durations
  const getMultibets = () => {
    const bankers = getBankers();
    const highConfidence = [...matches].sort((a,b) => b.conf - a.conf).slice(0, 20);
    const highValue = [...matches].filter(m => m.value >= 0.85).slice(0, 16);

    return [
      {
        name: "🏆 CONMEBOL Power",
        icon: "fa-futbol",
        risk: "low",
        riskClass: "risk-low",
        duration: "06:00 – 12:00 UTC",
        legs: bankers.filter(m => ["Copa Libertadores", "Copa Sudamericana", "Copa do Brasil"].includes(m.league)).slice(0, 8),
        description: "South American giants at home"
      },
      {
        name: "🇺🇸 US Open Cup Special",
        icon: "fa-flag-usa",
        risk: "low",
        riskClass: "risk-low",
        duration: "12:00 – 18:00 UTC",
        legs: bankers.filter(m => m.league === "US Open Cup").slice(0, 8),
        description: "MLS dominance over lower leagues"
      },
      {
        name: "⚡ High Confidence Elite",
        icon: "fa-shield-alt",
        risk: "low",
        riskClass: "risk-low",
        duration: "18:00 – 00:00 UTC",
        legs: highConfidence.filter(m => m.banker).slice(0, 8),
        description: "Top 8 by confidence score"
      },
      {
        name: "💎 Value Hunting",
        icon: "fa-chart-line",
        risk: "medium",
        riskClass: "risk-medium",
        duration: "00:00 – 06:00 UTC (16 Apr)",
        legs: highValue.filter(m => !m.banker).slice(0, 6),
        description: "High value, non-banker selections"
      },
      {
        name: "🌍 World Cup Qualifiers",
        icon: "fa-globe",
        risk: "medium",
        riskClass: "risk-medium",
        duration: "12:00 – 18:00 UTC",
        legs: matches.filter(m => m.league === "WCQ" && m.conf >= 75).slice(0, 6),
        description: "International duty special"
      },
      {
        name: "🔥 European Elite",
        icon: "fa-star",
        risk: "medium",
        riskClass: "risk-medium",
        duration: "18:00 – 00:00 UTC",
        legs: matches.filter(m => ["UCL", "Championship", "Eliteserien"].includes(m.league) && m.conf >= 72).slice(0, 7),
        description: "Top European competitions"
      }
    ];
  };

  const renderMatchCard = (m) => {
    const cs = m.correctScores[0];
    const isValue = m.value >= 0.85;
    return `
      <div class="match-card ${m.banker ? 'banker' : ''} ${isValue ? 'value' : ''}">
        ${m.banker ? '<div class="badge-container"><span class="banker-icon"><i class="fas fa-gem"></i> BANKER</span></div>' : ''}
        ${isValue && !m.banker ? '<div class="badge-container"><span class="value-badge"><i class="fas fa-chart-line"></i> VALUE</span></div>' : ''}
        <div class="card-header"><span class="league-tag">${m.league}</span><span class="confidence-badge">${m.conf}%</span></div>
        <div class="team-row"><span class="team-name"><i class="fas fa-home"></i> ${m.home}</span><span class="prediction-tag">${m.pred.includes('WIN') ? (m.pred.includes('AWAY') ? 'AWAY' : 'HOME') : 'DRAW'}</span></div>
        <div class="team-row"><span class="team-name"><i class="fas fa-flag-checkered"></i> ${m.away}</span><span class="prediction-tag">${m.pred.includes('AWAY') ? 'AWAY' : (m.pred.includes('Draw') ? 'DRAW' : '')}</span></div>
        <div class="outcome-row"><span>🎯 Prediction</span><span class="outcome-value">${m.pred}</span></div>
        <div class="correct-score-section"><div class="cs-main"><span class="cs-score">${cs.home} - ${cs.away}</span><span class="cs-prob">${cs.prob}%</span></div><div class="cs-other-scores">${m.correctScores.slice(1,3).map(c => `<span class="cs-other-item">${c.home}-${c.away} ${c.prob}%</span>`).join('')}</div></div>
        <div class="btss-section"><div>📊 BTTS <span class="bts-value ${m.bttsProb > 50 ? 'yes' : 'no'}">${m.bttsProb}%</span></div><div>⚽ Over 2.5 <span class="bts-value ${m.over25Prob > 50 ? 'yes' : 'no'}">${m.over25Prob}%</span></div><div>💎 Value ${Math.round(m.value * 100)}%</div></div>
        <div class="odds-row"><span>1: ${m.odds.home}</span><span>X: ${m.odds.draw}</span><span>2: ${m.odds.away}</span></div>
        <div class="human-factor"><i class="fas fa-microchip"></i> ${m.tip.substring(0, 50)}</div>
      </div>
    `;
  };

  const renderCorrectScoreCard = (m) => {
    const cs = m.correctScores[0];
    return `
      <div class="match-card ${m.banker ? 'banker' : ''}">
        ${m.banker ? '<div class="badge-container"><span class="banker-icon"><i class="fas fa-gem"></i> BANKER</span></div>' : ''}
        <div class="card-header"><span class="league-tag">${m.league}</span><span class="confidence-badge">${m.conf}%</span></div>
        <div class="team-row"><strong>${m.home}</strong> vs <strong>${m.away}</strong></div>
        <div class="correct-score-section"><div class="cs-main"><span class="cs-score">${cs.home} - ${cs.away}</span><span class="cs-prob">${cs.prob}%</span></div><div class="cs-other-scores">${m.correctScores.slice(1,4).map(c => `<span class="cs-other-item">${c.home}-${c.away} ${c.prob}%</span>`).join('')}</div></div>
        <div class="btss-section"><div>BTTS Yes: ${m.bttsProb}%</div><div>BTTS No: ${100 - m.bttsProb}%</div><div>Over 2.5: ${m.over25Prob}%</div><div>Under 2.5: ${100 - m.over25Prob}%</div></div>
        <div class="odds-row"><span>1: ${m.odds.home}</span><span>X: ${m.odds.draw}</span><span>2: ${m.odds.away}</span></div>
      </div>
    `;
  };

  const renderMultibetCard = (mb) => {
    const totalOdds = mb.legs.reduce((acc, m) => acc * getMatchOdds(m), 1);
    const expectedRoi = ((totalOdds - 1) * 0.65 * 100).toFixed(1);
    return `
      <div class="multibet-card">
        <div class="multibet-header">
          <div class="multibet-name"><i class="fas ${mb.icon}"></i> ${mb.name}</div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <span class="duration-badge"><i class="far fa-clock"></i> 🕒 ${mb.duration}</span>
            <div class="multibet-risk ${mb.riskClass}">${mb.risk.toUpperCase()} RISK</div>
          </div>
        </div>
        <div class="multibet-legs">
          ${mb.legs.map((m, idx) => `
            <div class="multibet-leg">
              <span>${idx+1}. ${m.home} vs ${m.away}</span>
              <div><span class="multibet-leg-prediction">${m.pred}</span> <span class="multibet-leg-odds">${getMatchOdds(m)}</span></div>
            </div>
          `).join('')}
        </div>
        <div class="multibet-footer">
          <div>
            <div style="font-size: 11px; color: #7c93bb;">${mb.legs.length}-Fold Accumulator</div>
            <div class="multibet-total-odds">${totalOdds.toFixed(2)}</div>
          </div>
          <div class="multibet-roi"><i class="fas fa-chart-line"></i> Expected ROI: +${expectedRoi}%</div>
        </div>
      </div>
    `;
  };

  const renderPredictions = () => {
    let filtered = getFiltered(state.league);
    filtered = getSorted(filtered, state.sort);
    return `<div class="matches-grid">${filtered.map(renderMatchCard).join('')}</div>`;
  };

  const renderCorrectScores = () => {
    let filtered = getFiltered(state.csLeague);
    return `<div class="matches-grid">${filtered.map(renderCorrectScoreCard).join('')}</div>`;
  };

  const renderMultibets = () => {
    const multibets = getMultibets();
    return `<div class="multibets-grid">${multibets.map(renderMultibetCard).join('')}</div>`;
  };

  const renderAnalysis = () => {
    const bankers = getBankers();
    const avgConf = Math.round(matches.reduce((s,m) => s + m.conf, 0) / matches.length);
    const avgValue = Math.round(matches.reduce((s,m) => s + m.value * 100, 0) / matches.length);
    const avgBTTS = Math.round(matches.reduce((s,m) => s + m.bttsProb, 0) / matches.length);
    const avgO25 = Math.round(matches.reduce((s,m) => s + m.over25Prob, 0) / matches.length);
    const maxCSProb = Math.max(...matches.map(m => m.correctScores[0].prob));

    return `
      <div class="stats-row">
        <div class="stat-card"><div class="stat-value">${matches.length}</div><div class="stat-label">Total Matches</div></div>
        <div class="stat-card"><div class="stat-value">${bankers.length}</div><div class="stat-label">Banker Picks</div></div>
        <div class="stat-card"><div class="stat-value">${avgConf}%</div><div class="stat-label">Avg Confidence</div></div>
        <div class="stat-card"><div class="stat-value">${avgValue}%</div><div class="stat-label">Avg Value</div></div>
        <div class="stat-card"><div class="stat-value">${avgBTTS}%</div><div class="stat-label">Avg BTTS</div></div>
        <div class="stat-card"><div class="stat-value">${avgO25}%</div><div class="stat-label">Avg Over 2.5</div></div>
      </div>
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-value">${maxCSProb}%</div><div class="kpi-title">🎯 Highest CS Probability</div></div>
        <div class="kpi-card"><div class="kpi-value">${bankers.length}</div><div class="kpi-title">💎 Banker Selections</div></div>
        <div class="kpi-card"><div class="kpi-value">${getLeagues().length}</div><div class="kpi-title">🏆 Competitions</div></div>
      </div>
      <div class="analysis-card">
        <div class="analysis-title"><i class="fas fa-gem"></i> Top 12 Bankers</div>
        ${bankers.slice(0,12).map(m => `<div class="table-row"><span>${m.home} vs ${m.away}</span><span>${m.conf}% · ${m.correctScores[0].home}-${m.correctScores[0].away}</span></div>`).join('')}
      </div>
      <div class="analysis-card">
        <div class="analysis-title"><i class="fas fa-chart-bar"></i> League Averages</div>
        ${getLeagues().slice(0,8).map(l => {
          const avgB = Math.round(l.matches.reduce((s,m) => s + m.bttsProb, 0) / l.matches.length);
          const avgO = Math.round(l.matches.reduce((s,m) => s + m.over25Prob, 0) / l.matches.length);
          return `<div class="table-row"><span>${l.name}</span><span>BTTS: ${avgB}% · O2.5: ${avgO}%</span></div>`;
        }).join('')}
      </div>
    `;
  };

  const renderAll = () => {
    if (state.page === 'predictions') document.getElementById('predictionsContent').innerHTML = renderPredictions();
    else if (state.page === 'correctscores') document.getElementById('correctScoresContent').innerHTML = renderCorrectScores();
    else if (state.page === 'multibets') document.getElementById('multibetsContent').innerHTML = renderMultibets();
    else if (state.page === 'analysis') {
      document.getElementById('analysisStatsContainer').innerHTML = renderAnalysis();
      document.getElementById('analysisContent').innerHTML = '';
    }

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${state.page}`).classList.add('active');
    document.querySelectorAll('.desktop-nav .nav-item, .bottom-nav .nav-item').forEach(btn => {
      if (btn.dataset.page === state.page) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  };

  const init = () => {
    const leagueOptions = `<option value="all">🌍 ALL LEAGUES (${matches.length})</option>` +
      getLeagues().map(l => `<option value="${l.name}">${l.name} (${l.matches.length})</option>`).join('');
    document.getElementById('leagueSelect').innerHTML = leagueOptions;
    document.getElementById('csLeagueSelect').innerHTML = leagueOptions;

    document.getElementById('viewToggle').innerHTML = `
      <button class="view-btn active" data-view="grouped">📁 Grouped</button>
      <button class="view-btn" data-view="all">📋 All</button>
      <button class="view-btn" data-view="bankers">💎 Bankers</button>
    `;

    document.querySelectorAll('#viewToggle .view-btn').forEach(btn => {
      btn.addEventListener('click', () => setState('view', btn.dataset.view));
    });
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => setState('sort', btn.dataset.sort));
    });
    document.getElementById('leagueSelect').addEventListener('change', e => setState('league', e.target.value));
    document.getElementById('csLeagueSelect').addEventListener('change', e => setState('csLeague', e.target.value));

    document.querySelectorAll('.desktop-nav .nav-item, .bottom-nav .nav-item').forEach(btn => {
      btn.addEventListener('click', () => setState('page', btn.dataset.page));
    });

    subscribe(renderAll);
    renderAll();
  };

  init();
})();
</script>
</body>
</html>
